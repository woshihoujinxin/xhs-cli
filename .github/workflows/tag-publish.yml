name: tag-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Publish version without leading v (optional; defaults to package.json when manually dispatched)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref_name || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide npm publish
        id: npm_gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN secret is missing; skipping publish."
          fi

      - name: Setup Node
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Resolve target version
        id: version
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          current_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_NAME:-}" == v* ]]; then
            target_version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            target_version="${{ github.event.inputs.version }}"
          else
            target_version="$current_version"
          fi

          if ! [[ "$target_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid publish version: $target_version" >&2
            exit 1
          fi

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "target=$target_version" >> "$GITHUB_OUTPUT"

      - name: Sync package version
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: |
          current_version="$(node -p "require('./package.json').version")"
          target_version="${{ steps.version.outputs.target }}"
          if [ "$current_version" != "$target_version" ]; then
            npm version "$target_version" --no-git-tag-version
          else
            echo "package.json version already $target_version; skip npm version"
          fi

      - name: Install dependencies
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: npm ci

      - name: Run tests
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: npm test

      - name: Check published npm version
        id: npm_version
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: |
          version="${{ steps.version.outputs.target }}"
          if npm view "xhs-cli@${version}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "xhs-cli ${version} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check publish payload
        if: ${{ steps.npm_gate.outputs.publish == 'true' && steps.npm_version.outputs.exists != 'true' }}
        run: npm pack --dry-run --json

      - name: Publish npm package
        if: ${{ steps.npm_gate.outputs.publish == 'true' && steps.npm_version.outputs.exists != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Verify published version
        if: ${{ steps.npm_gate.outputs.publish == 'true' }}
        run: npm view "xhs-cli@${{ steps.version.outputs.target }}" version dist-tags --json --registry=https://registry.npmjs.org/
